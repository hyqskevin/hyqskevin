name: Generate Snake

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Platane/snk@v3
        with:
          github_user_name: hyqskevin
          outputs: |
            dist/github-snake.svg
      - run: mv dist/github-snake.svg snake.svg
      - uses: actions/upload-artifact@v4
        with:
          name: snake
          path: snake.svg
